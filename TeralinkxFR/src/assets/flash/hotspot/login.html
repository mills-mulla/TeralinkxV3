<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <link rel="icon" href="/assets/TeralinkxWavesic.jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teralinkx Waves - Login</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      }
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 360px;
      width: 100%;
      padding: 30px 25px;
      text-align: center;
      animation: slideIn 0.5s ease-out;
    }
    
    @media (prefers-color-scheme: dark) {
      .container {
        background: #2d3748;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    h1 {
      color: #1a202c;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    @media (prefers-color-scheme: dark) {
      h1 {
        color: #f7fafc;
      }
    }
    
    p {
      color: #718096;
      font-size: 14px;
      margin-bottom: 25px;
    }
    
    @media (prefers-color-scheme: dark) {
      p {
        color: #a0aec0;
      }
    }
    
    .loader {
      width: 40px;
      height: 40px;
      margin: 0 auto;
      border: 3px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @media (prefers-color-scheme: dark) {
      .loader {
        border-color: #4a5568;
        border-top-color: #667eea;
      }
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .dots {
      display: inline-flex;
      gap: 3px;
      margin-left: 3px;
    }
    
    .dot {
      width: 5px;
      height: 5px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    
    .dot:nth-child(1) {
      animation-delay: -0.32s;
    }
    
    .dot:nth-child(2) {
      animation-delay: -0.16s;
    }
    
    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .info {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      font-size: 12px;
      color: #a0aec0;
    }
    
    @media (prefers-color-scheme: dark) {
      .info {
        border-top-color: #4a5568;
        color: #718096;
      }
    }
  </style>
  
  <script>
    // Extract MikroTik variables using template syntax
    function setupMikroTikVariables() {
      // MikroTik template variables
      const mac = '$(mac)';
      const ip = '$(ip)';
      const username = '$(username)';
      
      // Simply use the values directly since they're already processed by MikroTik
      const macProcessed = mac || '';
      const ipProcessed = ip || '';
      const usernameProcessed = username || '';
      
      // Set global variables for Vue app
      window.hotspotContext = { 
        mac: macProcessed, 
        ip: ipProcessed,
        username: usernameProcessed
      };
      
      // Store in sessionStorage (survives redirects)
      sessionStorage.setItem('hotspotContext', JSON.stringify(window.hotspotContext));
      
      // Store in localStorage for persistence
      if (macProcessed) localStorage.setItem('hs_mac', macProcessed);
      if (ipProcessed) localStorage.setItem('hs_ip', ipProcessed);
    }

    // Redirect to SPA with variables preserved
    function redirectToApp() {
      setupMikroTikVariables();
      window.location.replace('/htm.html#/');
    }

    // Setup on page load
    window.addEventListener('DOMContentLoaded', redirectToApp);
  </script>
</head>

<body>
  <div class="container">
    <div class="logo">
      <img src="/assets/teralinkx2.png" alt="Teralinkx Waves">
    </div>
    <h1>Teralinkx Waves</h1>
    <p>
      Redirecting to dashboard
      <span class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
    </p>
    <div class="loader"></div>
    <div class="info">Please wait while we connect you</div>
  </div>
</body>
</html>
