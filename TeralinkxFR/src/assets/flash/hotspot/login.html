<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <link rel="icon" href="/assets/teralinkx2-D-ymN_3H.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teralinkx Waves - Login</title>
  
  
  <script>
    // Extract MikroTik variables using template syntax
    function setupMikroTikVariables() {
      // MikroTik template variables
      const mac = '$(mac)';
      const ip = '$(ip)';
      const username = '$(username)';
      
      // Simply use the values directly since they're already processed by MikroTik
      const macProcessed = mac || '';
      const ipProcessed = ip || '';
      const usernameProcessed = username || '';
      
      // Set global variables for Vue app
      window.hotspotContext = { 
        mac: macProcessed, 
        ip: ipProcessed,
        username: usernameProcessed
      };
      
      // Store in sessionStorage (survives redirects)
      sessionStorage.setItem('hotspotContext', JSON.stringify(window.hotspotContext));
      
      // Store in localStorage for persistence
      if (macProcessed) localStorage.setItem('hs_mac', macProcessed);
      if (ipProcessed) localStorage.setItem('hs_ip', ipProcessed);
    }

    // Redirect to SPA with variables preserved
    function redirectToApp() {
      setupMikroTikVariables();
      window.location.replace('/index.html#/');
    }

    // Setup on page load
    window.addEventListener('DOMContentLoaded', redirectToApp);
  </script>
</head>

<body>
  <div class="flex flex-col items-center justify-center h-screen p-6 text-center">
    <h1 class="text-2xl font-bold mb-4">Welcome to Teralinkx Waves</h1>
    <p class="text-gray-700 mb-6">Redirecting to dashboard...</p>
    <div class="loader border-4 border-blue-500 border-t-transparent rounded-full w-12 h-12 animate-spin mx-auto"></div>
  </div>
</body>
</html>

<style>
/* Simple spinning loader */
.loader {
  border-top-color: transparent;
  border-right-color: transparent;
}
.animate-spin {
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
