<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/teralinkx2-D-ymN_3H.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teralinkx Waves</title>
    <!-- <script type="module" crossorigin src="/assets/index-CkQmJprA.js"></script> -->

    <link rel="stylesheet" crossorigin href="/assets/index-SjT8YZBd.css" />
    <script>
      // This function will be called after MikroTik processes the template
      function initVueApp() {
        window.hotspotContext = {
          mac: '$(mac)'.replace(/-/g, ':'), // Ensure proper MAC format
          ip: '$(ip)',
        }
        // console.log('Processed Hotspot context:', window.hotspotContext);

        // Start Vue app only after we have the values
        const appScript = document.createElement('script')
        appScript.type = 'module'
        appScript.src = '/assets/index-DjELnnsz.js'
        document.body.appendChild(appScript)
      }

      // Fallback if MikroTik doesn't process the template
      setTimeout(() => {
        if (!window.hotspotContext || window.hotspotContext.mac === '$(mac)') {
          const params = new URLSearchParams(window.location.search)
          window.hotspotContext = {
            mac: params.get('mac') || '',
            ip: params.get('ip') || '',
          }
        }
        initVueApp()
      }, 100)
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
