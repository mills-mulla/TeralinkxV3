global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # TeralinkX Django App
  - job_name: 'teralinkx'
    static_configs:
      - targets: ['web:8009']
    metrics_path: '/metrics'

  # Radius API
  - job_name: 'radius_api'
    static_configs:
      - targets: ['radiusapi:8010']
    metrics_path: '/metrics'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter (Host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (Container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # HIDS Engine
  - job_name: 'hids_engine'
    static_configs:
      - targets: ['hids_engine:5003']
    metrics_path: '/metrics'

  # HIDS ML Service
  - job_name: 'hids_ml_service'
    static_configs:
      - targets: ['hids_ml_service:5001']
    metrics_path: '/metrics'

  # HIDS Dashboard
  - job_name: 'hids_dashboard'
    static_configs:
      - targets: ['hids_dashboard:5002']
    metrics_path: '/metrics'
