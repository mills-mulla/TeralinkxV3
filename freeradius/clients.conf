# FreeRADIUS Clients Configuration
# Define NAS devices (MikroTik routers) that can connect to RADIUS

# Localhost for testing
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

# MikroTik routers - Add your actual router IPs here
client mikrotik_network {
    ipaddr = 192.168.88.0/24
    secret = changeme_strong_secret
    require_message_authenticator = no
    nas_type = mikrotik
}

