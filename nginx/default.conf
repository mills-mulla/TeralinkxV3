# TeralinkX V3 Nginx Configuration
# Unified Architecture - All domains route through Cloudflare to Nginx

# Use Docker's internal DNS
resolver 127.0.0.11 valid=30s ipv6=off;

# ============================================================================
# CORS map - resolve allowed origin
# ============================================================================
map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$"     $http_origin;
    "~^https://.*\.teralinkxwaves\.uk$"   $http_origin;
    "~^https://teralinkxwaves\.uk$"       $http_origin;
    "~^http://192\.168\."                 $http_origin;
}

# ============================================================================
# UNIFIED APP - accounts.teralinkxwaves.uk (Local Access)
# ============================================================================
server {
    listen 80;
    server_name accounts.teralinkxwaves.uk localhost;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name accounts.teralinkxwaves.uk localhost;
    
    ssl_certificate /etc/letsencrypt/live/teralinkxwaves.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teralinkxwaves.uk/privkey.pem;
    
    client_max_body_size 100M;
    
    set $backend_host web;
    set $backend_port 8009;
    
    # Admin Panel (Vue.js) - /su/
    location /su/ {
        alias /app/admin-dist/;
        try_files $uri $uri/ /su/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    location /su/assets/ {
        alias /app/admin-dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /service/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/ {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Client-Timestamp, X-Session-ID, X-Client-Version, X-Hotspot-Name, X-Device-Mac, X-Device-IP, X-Backend-Version, X-Token-Version' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Range, X-Content-Range, X-Session-ID, X-Client-Version, X-Backend-Version, X-Token-Version' always;
        if ($request_method = 'OPTIONS') { return 204; }
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /suapi/ {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Client-Timestamp, X-Session-ID, X-Client-Version, X-Hotspot-Name, X-Device-Mac, X-Device-IP, X-Backend-Version, X-Token-Version' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Range, X-Content-Range, X-Session-ID, X-Client-Version, X-Backend-Version, X-Token-Version' always;
        if ($request_method = 'OPTIONS') { return 204; }
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /static/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    location /media/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    location /locations/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /silk/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    location /__debug__/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    location /metrics {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    location / {
        alias /app/frontend-dist/;
        try_files $uri $uri/ /index.html;
    }
}

# ============================================================================
# PUBLIC DOMAINS - Served through Cloudflare Tunnel
# ============================================================================

# Client Frontend (cli.teralinkxwaves.uk)
server {
    listen 80;
    server_name cli.teralinkxwaves.uk;
    location / {
        alias /app/frontend-dist/;
        try_files $uri $uri/ /index.html;
    }
}

