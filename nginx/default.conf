# Admin Panel (su.teralinkxwaves.uk)
server {
    listen 80;
    server_name su.teralinkxwaves.uk;
    
    client_max_body_size 100M;
    
    # Backend variables
    set $backend_host web;
    set $backend_port 8009;
    
    # Django Superuser Analytics API - /suapi/
    # Django Superuser Analytics API - /suapi/
    location /suapi/ {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Client-Timestamp, X-Session-ID, X-Client-Version' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    # Django Backend API - /api/ (for auth)
    location /api/ {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Client-Timestamp, X-Session-ID, X-Client-Version, X-Hotspot-Name, X-Device-Mac, X-Device-IP, X-Backend-Version, X-Token-Version' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Range, X-Content-Range, X-Session-ID, X-Client-Version, X-Backend-Version, X-Token-Version' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    # Django Static Files
    location /static/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    # Django Media Files
    location /media/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    # Admin Panel assets
    location /assets/ {
        alias /app/admin-dist-standalone/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Admin Panel favicon
    location /favicon.ico {
        alias /app/admin-dist-standalone/favicon.ico;
    }
    
    # Admin Panel (Vue.js) - standalone build with base: '/'
    location / {
        alias /app/admin-dist-standalone/;
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}

# MikroTik Router Proxy (router.teralinkxwaves.uk)
upstream mikrotik {
    server 192.168.88.1:80;
}

server {
    listen 80;
    server_name router.teralinkxwaves.uk;
    
    location / {
        proxy_pass http://mikrotik;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Large uploads (firmware/backups)
        client_max_body_size 100M;
        
        # Disable buffering for real-time updates
        proxy_buffering off;
    }
}

