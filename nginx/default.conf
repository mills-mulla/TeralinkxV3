# TeralinkX V3 Nginx Configuration
# Generated on Sat Mar 28 06:39:37 PM EAT 2026
# Domain: teralinkxwaves.uk

upstream backend {
    server web:8000;
}

upstream radius_api {
    server radius_api:8001;
}

# Frontend (cli.teralinkxwaves.uk)
server {
    listen 80;
    server_name cli.teralinkxwaves.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cli.teralinkxwaves.uk;
    
    ssl_certificate /etc/letsencrypt/live/teralinkxwaves.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teralinkxwaves.uk/privkey.pem;
    
    root /var/www/html/client;
    index index.html;
    
    location / {
        alias /app/frontend-dist/;
        try_files $uri $uri/ /index.html;
    }
}

# Backend API (srv.teralinkxwaves.uk)
server {
    listen 80;
    server_name srv.teralinkxwaves.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name srv.teralinkxwaves.uk;
    
    ssl_certificate /etc/letsencrypt/live/teralinkxwaves.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teralinkxwaves.uk/privkey.pem;
    
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin Panel (su.teralinkxwaves.uk)
server {
    listen 80;
    server_name su.teralinkxwaves.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name su.teralinkxwaves.uk;
    
    ssl_certificate /etc/letsencrypt/live/teralinkxwaves.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teralinkxwaves.uk/privkey.pem;
    
    root /var/www/html/admin;
    index index.html;
    
    location / {
        alias /app/admin-dist/;
        try_files $uri $uri/ /index.html;
    }
    
    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
