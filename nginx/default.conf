# TeralinkX V3 Nginx Configuration
# Unified Architecture - All domains route through Cloudflare to Nginx

# Use Docker's internal DNS
resolver 127.0.0.11 valid=30s ipv6=off;

# ============================================================================
# UNIFIED APP - accounts.teralinkxwaves.uk (Local Access)
# ============================================================================
server {
    listen 80;
    server_name accounts.teralinkxwaves.uk localhost;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name accounts.teralinkxwaves.uk localhost;
    
    ssl_certificate /etc/letsencrypt/live/teralinkxwaves.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teralinkxwaves.uk/privkey.pem;
    
    client_max_body_size 100M;
    
    # Backend variables
    set $backend_host web;
    set $backend_port 8009;
    
    # Admin Panel (Vue.js) - /su/
    location /su/ {
        alias /app/admin-dist/;
        try_files $uri $uri/ /su/index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
    
    # Admin Panel assets
    location /su/assets/ {
        alias /app/admin-dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Django Admin Interface - /service/
    location /service/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    # Django Backend API - /api/
    location /api/ {
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Client-Timestamp, X-Session-ID, X-Client-Version, X-Hotspot-Name, X-Device-Mac, X-Device-IP, X-Backend-Version, X-Token-Version' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Range, X-Content-Range, X-Session-ID, X-Client-Version, X-Backend-Version, X-Token-Version' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    # Django Superuser Analytics API - /suapi/
    location /suapi/ {
        
        
        
        
        
        
        
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
    
    # Django Static Files
    location /static/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    # Django Media Files
    location /media/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    # Django Locations API
    location /locations/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Django Silk Profiler (dev only)
    location /silk/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Django Debug Toolbar (dev only)
    location /__debug__/ {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Prometheus Metrics
    location /metrics {
        proxy_pass http://$backend_host:$backend_port;
        proxy_set_header Host $host;
    }
    
    # Client Frontend (Vue.js) - / (root - must be last)
    location / {
        alias /app/frontend-dist/;
        try_files $uri $uri/ /index.html;
    }
}

