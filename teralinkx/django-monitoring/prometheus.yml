# prometheus.yml
global:
  scrape_interval: 15s # How often to scrape targets

scrape_configs:
  - job_name: 'prometheus'
    # Scrape Prometheus's own metrics
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'django'
    # Scrape your Django application's metrics
    static_configs:
      - targets: ['host.docker.internal:8000']
