#docker compose for v3 isolation from v2 stable
services:
  webv3:
    build:
      context: .
    container_name: teralinkx_webv3

    # IMPORTANT: bind to port 8009
    command: gunicorn --bind 0.0.0.0:8009 teralinkx.wsgi:application

    volumes:
      - .:/app
      - ./media:/app/media
      - ./static:/app/static
      - ./staticvolume:/app/staticfiles

    ports:
      - "8009:8009"

    env_file:
      - .env

    restart: always

    networks:
      - app_network


networks:
  app_network:
    external: true
    name: teralinkx_app_network


