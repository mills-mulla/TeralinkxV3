# TeralinkX V3 - Production Stack
services:
  # ===============================
  # DJANGO GUNICORN SERVICE
  # ===============================
  web:
    build:
      context: .
    container_name: teralinkx_web
    command: gunicorn --config gunicorn_config.py teralinkx.wsgi:application
    volumes:
      - .:/app
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8009:8009"
    environment:
      - TZ=Africa/Nairobi
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always
    cpus: 1.5
    mem_limit: 2g
    networks:
      - app_network

  # ===============================
  # CELERY WORKER
  # ===============================
  celery:
    build:
      context: .
    container_name: teralinkx_celery
    command: celery -A teralinkx worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
      - web
    restart: always
    cpus: 0.7
    mem_limit: 1g
    networks:
      - app_network

  # ===============================
  # CELERY BEAT
  # ===============================
  celery_beat:
    build:
      context: .
    container_name: teralinkx_beat
    command: celery -A teralinkx beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
      - web
    restart: always
    cpus: 0.5
    mem_limit: 512m
    networks:
      - app_network

  # ===============================
  # NGINX (Reverse Proxy)
  # ===============================
  nginx:
    image: nginx:latest
    container_name: teralinkx_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media:ro
      - ./staticfiles:/app/staticfiles:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: always
    networks:
      - app_network

  # ===============================
  # CLOUDFLARED (Cloudflare Tunnel)
  # ===============================
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    container_name: teralinkx_cloudflared
    command: tunnel run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - nginx
    cpus: 0.5
    mem_limit: 256m
    networks:
      - app_network

  # ===============================
  # REDIS (Celery Broker & Cache)
  # ===============================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    cpus: 0.5
    mem_limit: 512m
    networks:
      - app_network

  # ===============================
  # POSTGRES DATABASE
  # ===============================
  db:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: teralinkx
      POSTGRES_USER: teralinkx
      POSTGRES_PASSWORD: justboot
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
    cpus: 1
    mem_limit: 1.5g
    ports:
      - "5432:5432"
    networks:
      - app_network

  # ===============================
  # FREERADIUS SERVER
  # ===============================
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: freeradius_server
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    volumes:
      - ./freeradius/mods-available/sql:/etc/freeradius/mods-available/sql
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf
      - ./freeradius/entrypoint.sh:/entrypoint.sh
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Africa/Nairobi
    entrypoint: ["/entrypoint.sh"]
    restart: always
    networks:
      - app_network

  # ===============================
  # RADIUS API (Port 8010)
  # ===============================
  radius_api:
    build:
      context: ../radius_api
    container_name: radiusapi
    command: python manage.py runserver 0.0.0.0:8010
    volumes:
      - ../radius_api:/app
    ports:
      - "8010:8010"
    environment:
      - DJANGO_SETTINGS_MODULE=radius_api.settings
    depends_on:
      - db
    restart: always
    networks:
      - app_network

volumes:
  pg_data:

networks:
  app_network:
    driver: bridge
