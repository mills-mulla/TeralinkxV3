#docker compose for v3 isolation from v2 stable
services:
  webv3:
    build:
      context: .
    container_name: teralinkx_webv3

    # IMPORTANT: bind to port 8009
    command: gunicorn --config gunicorn_config.py teralinkx.wsgi:application

    volumes:
      - .:/app
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    ports:
      - "8009:8009"

    environment:
      - TZ=Africa/Nairobi

    env_file:
      - .env

    restart: always

    networks:
      - app_network

  # ===============================
  # FREERADIUS SERVER
  # ===============================
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: freeradius_server
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    volumes:
      - ./freeradius/mods-available/sql:/etc/freeradius/mods-available/sql
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf
      - ./freeradius/entrypoint.sh:/entrypoint.sh
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Africa/Nairobi
    entrypoint: ["/entrypoint.sh"]
    restart: always
    networks:
      - app_network
      
