server {
    listen 80;
    server_name teralinkxwaves.uk service.teralinkxwaves.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name teralinkxwaves.uk service.teralinkxwaves.uk;

    # SSL certs
    ssl_certificate     /etc/letsencrypt/live/teralinkxwaves.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teralinkxwaves.uk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # STATIC + MEDIA (Must be before frontend)
    # ============================================================

    # V3 Static
    location /static/ {
        alias /app/staticfiles/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # V3 Media
    location /media/ {
        alias /app/media/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ============================================================
    # ADMIN PANEL (Vue) - /su/
    # ============================================================
    location /su/ {
        alias /app/admin-dist/;
        index index.html;
        try_files $uri $uri/ /su/index.html;
        autoindex off;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    }

    location /su/assets/ {
        alias /app/admin-dist/assets/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # FRONTEND (Vue)
    # ============================================================
    location / {
        alias /app/dist/;
        index index.html;
        try_files $uri $uri/ /index.html;
        autoindex off;
    }

    location /assets/ {
        alias /app/dist/assets/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # V3 BACKEND (Production)
    # ============================================================

    # V3 API
    location /api/ {
        proxy_pass http://teralinkx_web:8009/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # V3 Superuser API
    location /suapi/ {
        proxy_pass http://teralinkx_web:8009/suapi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # V3 Admin Panel
    location /admin/ {
        proxy_pass http://teralinkx_web:8009/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # V3 Healthcheck
    location /health/ {
        proxy_pass http://teralinkx_web:8009/health/;
        proxy_set_header Host $host;
        access_log off;
    }

    # ============================================================
    # SECURITY BLOCKS
    # ============================================================

    location ~ /\. { deny all; }
    location ~* (\.env|\.git|\.svn) { deny all; }
}
