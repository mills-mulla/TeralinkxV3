server {
    listen 443 ssl http2;
    server_name test.teralinkxwaves.uk;

    # SSL certs
    ssl_certificate     /etc/letsencrypt/live/teralinkxwaves.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teralinkxwaves.uk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vue.js Frontend - serve from custom path
    location / {
        alias /app/dist/;  # Make sure it ends with /
        index index.html;
        try_files $uri $uri/ /index.html;
        autoindex off;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location /assets/ {
        alias /app/dist/assets/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }


    # Django API endpoints
    location /api/ {
        proxy_pass http://web:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Superuser admin API
    location /suapi/ {
        proxy_pass http://web:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://web:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        alias /app/staticfiles/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        alias /app/media/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Healthcheck
    location /health/ {
        proxy_pass http://web:8100/health/;
        proxy_set_header Host $host;
        access_log off;
    }

    # Security blocks
    location ~ /\. { deny all; }
    location ~* (\.env|\.git|\.svn) { deny all; }
}